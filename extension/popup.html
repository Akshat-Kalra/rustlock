<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; font-family: system-ui; background: #1e1e2e; color: #cdd6f4; margin: 0; padding: 12px; }
    input { width: 100%; box-sizing: border-box; padding: 6px; border-radius: 4px; border: 1px solid #45475a; background: #313244; color: #cdd6f4; margin: 4px 0; }
    button { width: 100%; padding: 7px; border-radius: 4px; border: none; background: #89b4fa; color: #1e1e2e; font-weight: bold; cursor: pointer; margin-top: 6px; }
    #creds div { padding: 8px; border-radius: 4px; background: #313244; margin: 4px 0; cursor: pointer; }
    #creds div:hover { background: #45475a; }
    #status { font-size: 12px; color: #f38ba8; margin-top: 4px; }
    #save-banner { background: #313244; border-radius: 4px; padding: 8px; margin-bottom: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <div id="unlock-view">
    <div style="font-weight:bold;margin-bottom:8px">🔑 Rustlock</div>
    <input id="mp" type="password" placeholder="Master password">
    <button id="unlock-btn">Unlock</button>
    <div id="status"></div>
  </div>
  <div id="main-view" style="display:none">
    <div id="save-banner" style="display:none"></div>
    <div id="creds"></div>
    <button id="lock-btn" style="background:#45475a;margin-top:8px">Lock</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
